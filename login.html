<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anglo American Quellaveco — Verificación de Contratistas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap');

  :root {
    --aaq-red: #C0392B;
    --aaq-dark: #1A1A2E;
    --aaq-copper: #B5651D;
    --aaq-gold: #D4A017;
    --aaq-light: #F5F5F0;
    --aaq-gray: #6B7280;
    --aaq-border: #E5E7EB;
    --success: #16A34A;
    --warning: #D97706;
    --danger: #DC2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #0F1117;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(192,57,43,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(181,101,29,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,26,46,0.8) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-pattern {
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.01) 40px,
        rgba(255,255,255,0.01) 80px
      );
    pointer-events: none;
  }

  .login-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 460px;
    padding: 20px;
  }

  .brand-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .logo-diamond {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--aaq-red), #8B1A1A);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-diamond span {
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -1px;
  }

  .brand-text {
    text-align: left;
  }

  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #FFFFFF;
    letter-spacing: 1px;
    line-height: 1;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--aaq-gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 600;
  }

  .brand-tagline {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }

  .tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 9px;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }

  .tab-btn.active {
    background: var(--aaq-red);
    color: white;
    box-shadow: 0 4px 15px rgba(192,57,43,0.4);
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    transition: all 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--aaq-red);
    background: rgba(192,57,43,0.08);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--aaq-red), #8B1A1A);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(192,57,43,0.3);
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 25px rgba(192,57,43,0.5);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #FCA5A5;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show { display: block; }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    vertical-align: middle;
  }

  .loading-dots span {
    width: 5px; height: 5px;
    background: white;
    border-radius: 50%;
    animation: dot-pulse 1.4s infinite ease-in-out;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .version-tag {
    text-align: center;
    margin-top: 20px;
    color: rgba(255,255,255,0.15);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .admin-hint {
    background: rgba(212,160,23,0.1);
    border: 1px solid rgba(212,160,23,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    color: rgba(212,160,23,0.8);
    font-size: 12px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="login-container">
  <div class="brand-header">
    <div class="brand-logo">
      <div class="logo-diamond"><span>AA</span></div>
      <div class="brand-text">
        <div class="brand-name">ANGLO AMERICAN</div>
        <div class="brand-sub">Quellaveco</div>
      </div>
    </div>
    <p class="brand-tagline">Sistema de Verificación de Controles Críticos</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('auditor')">👷 Auditor</button>
      <button class="tab-btn" onclick="switchTab('admin')">🔐 Administrador</button>
    </div>

    <!-- Panel Auditor -->
    <div id="panel-auditor" class="panel active">
      <div class="form-group">
        <label>DNI</label>
        <input type="text" id="dni" placeholder="Ingrese su DNI" maxlength="8" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn-login" id="btn-auditor" onclick="loginAuditor()">
        INGRESAR
      </button>
      <div class="error-msg" id="error-auditor"></div>
    </div>

    <!-- Panel Admin -->
    <div id="panel-admin" class="panel">
      <div class="admin-hint">
        ⚠️ Acceso exclusivo para administradores Anglo American Quellaveco
      </div>
      <div class="form-group">
        <label>Contraseña Maestra</label>
        <input type="password" id="admin-pass" placeholder="Contraseña de administrador">
      </div>
      <button class="btn-login" id="btn-admin" onclick="loginAdmin()">
        ACCEDER AL SISTEMA
      </button>
      <div class="error-msg" id="error-admin"></div>
    </div>
  </div>

  <div class="version-tag">AAQ-VCC v2.0 · Anglo American Quellaveco S.A.</div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN — CAMBIAR ANTES DE DESPLEGAR
// ============================================================
const CONFIG = {
  SHEETBEST_URL: 'https://api.sheetbest.com/sheets/TU-ID-AQUI',
  ADMIN_PASSWORD: 'AAQ2025admin#',
  CALLMEBOT_APIKEY: 'TU-APIKEY-CALLMEBOT',
  IMGUR_CLIENT_ID: 'TU-CLIENT-ID-IMGUR'
};
// ============================================================

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`#panel-${tab}`).classList.add('active');
  event.target.classList.add('active');
  hideErrors();
}

function hideErrors() {
  document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span>`;
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.id === 'btn-admin' ? 'ACCEDER AL SISTEMA' : 'INGRESAR';
  }
}

function saveSession(data) {
  const str = JSON.stringify(data);
  try { localStorage.setItem('aaq_session', str); } catch(e) {}
  try { sessionStorage.setItem('aaq_session', str); } catch(e) {}
}

function getSession() {
  try {
    return JSON.parse(sessionStorage.getItem('aaq_session') || localStorage.getItem('aaq_session') || 'null');
  } catch(e) { return null; }
}

// Auto-redirect si ya hay sesión
const existingSession = getSession();
if (existingSession) {
  if (existingSession.role === 'admin') window.location.href = 'dashboard.html';
  else window.location.href = 'auditoria.html';
}

// Enter key handlers
document.getElementById('password').addEventListener('keypress', e => {
  if (e.key === 'Enter') loginAuditor();
});
document.getElementById('admin-pass').addEventListener('keypress', e => {
  if (e.key === 'Enter') loginAdmin();
});

async function loginAuditor() {
  const dni = document.getElementById('dni').value.trim().toUpperCase();
  const pass = document.getElementById('password').value.trim();

  if (!dni || !pass) {
    showError('error-auditor', 'Ingrese DNI y contraseña.');
    return;
  }

  setLoading('btn-auditor', true);
  hideErrors();

  try {
    const res = await fetch(`${CONFIG.SHEETBEST_URL}/tabs/usuarios`);
    if (!res.ok) throw new Error('Error de conexión con la base de datos');
    const usuarios = await res.json();

    const user = usuarios.find(u => 
      u.dni && u.dni.toString().trim().toUpperCase() === dni &&
      u.password && u.password.toString().trim() === pass
    );

    if (!user) {
      showError('error-auditor', 'DNI o contraseña incorrectos.');
      setLoading('btn-auditor', false);
      return;
    }

    if (user.activo === 'false' || user.activo === false || user.activo === '0') {
      showError('error-auditor', 'Tu cuenta está bloqueada. Contacta al administrador.');
      setLoading('btn-auditor', false);
      return;
    }

    const session = {
      role: 'auditor',
      dni: user.dni,
      nombres: user.nombres,
      apellidos: user.apellidos,
      whatsapp: user.whatsapp,
      area: user.area,
      timestamp: Date.now()
    };

    saveSession(session);
    await new Promise(r => setTimeout(r, 500));
    window.location.href = 'auditoria.html';

  } catch(err) {
    showError('error-auditor', 'Error de conexión. Verifica tu internet e intenta de nuevo.');
    console.error(err);
    setLoading('btn-auditor', false);
  }
}

async function loginAdmin() {
  const pass = document.getElementById('admin-pass').value.trim();

  if (!pass) {
    showError('error-admin', 'Ingrese la contraseña maestra.');
    return;
  }

  if (pass !== CONFIG.ADMIN_PASSWORD) {
    showError('error-admin', 'Contraseña incorrecta.');
    return;
  }

  setLoading('btn-admin', true);

  const session = {
    role: 'admin',
    nombres: 'Administrador',
    apellidos: 'AAQSA',
    timestamp: Date.now()
  };

  saveSession(session);
  await new Promise(r => setTimeout(r, 500));
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
